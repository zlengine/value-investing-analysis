<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>股票打分系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f0f2f5; color: #333; min-height: 100vh; }
        .header { background: linear-gradient(135deg, #1a5276, #2e86c1); color: white; padding: 30px 20px; text-align: center; }
        .header h1 { font-size: 28px; margin-bottom: 8px; }
        .header p { font-size: 14px; opacity: 0.85; }
        .container { max-width: 1000px; margin: 0 auto; padding: 20px; }
        .back-link { display: inline-block; margin-bottom: 15px; color: #1a5276; text-decoration: none; font-size: 14px; font-weight: 600; }
        .back-link:hover { text-decoration: underline; }
        .stats-bar { display: flex; gap: 15px; margin-bottom: 20px; flex-wrap: wrap; }
        .stat-card { background: white; border-radius: 10px; padding: 15px 20px; flex: 1; min-width: 140px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); text-align: center; }
        .stat-card .stat-num { font-size: 28px; font-weight: 700; }
        .stat-card .stat-label { font-size: 12px; color: #888; margin-top: 4px; }
        .filter-bar { display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; align-items: center; }
        .filter-bar label { font-size: 13px; color: #666; font-weight: 600; }
        .filter-bar select { padding: 6px 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 13px; }
        .score-table { width: 100%; border-collapse: collapse; background: white; border-radius: 10px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
        .score-table th { background: #f8f9fa; padding: 12px 15px; text-align: left; font-size: 13px; color: #555; border-bottom: 2px solid #e9ecef; cursor: pointer; user-select: none; }
        .score-table th:hover { background: #eef1f5; }
        .score-table td { padding: 10px 15px; border-bottom: 1px solid #f0f0f0; font-size: 14px; }
        .score-table tr:hover { background: #f8f9ff; }
        .score-table a { color: #1a5276; text-decoration: none; font-weight: 600; }
        .score-table a:hover { text-decoration: underline; }
        .score-val { font-weight: 700; font-size: 16px; }
        .score-val.s5 { color: #51cf66; } .score-val.s4 { color: #69db7c; } .score-val.s3 { color: #ffd43b; } .score-val.s2 { color: #ffa94d; } .score-val.s1 { color: #ff6b6b; }
        .stars { font-size: 12px; }
        .stars .on { color: #f39c12; } .stars .off { color: #ddd; }
        .no-score { color: #ccc; font-size: 13px; }
        .edit-btn { padding: 4px 10px; border: 1px solid #1a5276; border-radius: 5px; background: white; color: #1a5276; font-size: 12px; cursor: pointer; font-weight: 600; }
        .edit-btn:hover { background: #1a5276; color: white; }
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.4); z-index: 1000; align-items: center; justify-content: center; }
        .modal-overlay.active { display: flex; }
        .modal { background: white; border-radius: 12px; padding: 25px; width: 320px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); }
        .modal h3 { margin-bottom: 15px; font-size: 18px; color: #1a5276; }
        .modal label { display: block; font-size: 13px; color: #666; margin-bottom: 5px; font-weight: 600; }
        .modal select { width: 100%; padding: 8px 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; margin-bottom: 12px; }
        .modal-btns { display: flex; gap: 10px; margin-top: 15px; }
        .modal-btns button { flex: 1; padding: 8px; border: none; border-radius: 6px; font-size: 14px; font-weight: 600; cursor: pointer; }
        .btn-save { background: #27ae60; color: white; } .btn-save:hover { background: #219a52; }
        .btn-cancel { background: #eee; color: #666; } .btn-cancel:hover { background: #ddd; }
        .btn-delete { background: #e74c3c; color: white; } .btn-delete:hover { background: #c0392b; }
        .sort-active::after { content: ' ↑'; font-size: 11px; }
        .sort-active.desc::after { content: ' ↓'; font-size: 11px; }
        .empty-msg { text-align: center; color: #999; padding: 40px; font-size: 15px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>股票打分系统</h1>
        <p>对所有已分析公司进行基本面和价格评分，统一管理</p>
    </div>
    <div class="container">
        <a href="index.html" class="back-link">&larr; 返回首页</a>

        <div class="stats-bar" id="statsBar"></div>

        <div class="filter-bar">
            <label>基本面筛选:</label>
            <select id="filterF"><option value="">全部</option><option value="1">1分+</option><option value="2">2分+</option><option value="3">3分+</option><option value="4">4分+</option><option value="5">5分</option><option value="0">未评分</option></select>
            <label>价格筛选:</label>
            <select id="filterP"><option value="">全部</option><option value="1">1分+</option><option value="2">2分+</option><option value="3">3分+</option><option value="4">4分+</option><option value="5">5分</option><option value="0">未评分</option></select>
            <button onclick="toggleDiagPanel()" style="padding:5px 12px;border:1px solid #e74c3c;border-radius:6px;font-size:13px;background:#fdf2f2;color:#e74c3c;cursor:pointer;margin-left:auto;">🔧 打分诊断</button>
        </div>
    <div id="diagPanel" style="display:none;background:#fff3cd;border:1px solid #ffeaa7;border-radius:8px;padding:15px;margin-bottom:15px;">
        <h3 style="margin:0 0 10px;font-size:15px;color:#856404;">打分数据诊断与恢复</h3>
        <div id="diagStatus" style="font-size:13px;margin-bottom:10px;"></div>
        <div style="display:flex;gap:10px;flex-wrap:wrap;">
            <button onclick="diagCheck()" style="padding:6px 14px;border:1px solid #1a5276;border-radius:6px;font-size:13px;background:#1a5276;color:white;cursor:pointer;">检查打分数据</button>
            <button onclick="diagExport()" style="padding:6px 14px;border:1px solid #27ae60;border-radius:6px;font-size:13px;background:#27ae60;color:white;cursor:pointer;">导出打分数据</button>
            <button onclick="diagImport()" style="padding:6px 14px;border:1px solid #f39c12;border-radius:6px;font-size:13px;background:#f39c12;color:white;cursor:pointer;">导入打分数据</button>
            <button onclick="toggleDiagPanel()" style="padding:6px 14px;border:1px solid #999;border-radius:6px;font-size:13px;background:#eee;color:#333;cursor:pointer;">关闭</button>
        </div>
        <textarea id="diagTextarea" style="display:none;width:100%;height:120px;margin-top:10px;font-size:12px;border:1px solid #ddd;border-radius:6px;padding:8px;" placeholder='粘贴打分数据JSON，格式：{"AAPL":{"fundamental":4,"price":3,"updated":"2026-06-01T10:00:00Z"},...}'></textarea>
        <button id="diagImportBtn" onclick="diagDoImport()" style="display:none;padding:6px 14px;border:1px solid #27ae60;border-radius:6px;font-size:13px;background:#27ae60;color:white;cursor:pointer;margin-top:8px;">确认导入</button>
    </div>
    <script>
    function toggleDiagPanel(){
        var p=document.getElementById('diagPanel');
        p.style.display=p.style.display==='none'?'block':'none';
        if(p.style.display==='block')diagCheck();
    }
    function diagCheck(){
        var s=localStorage.getItem('stock_scores_v1');
        var el=document.getElementById('diagStatus');
        if(!s){el.innerHTML='<span style="color:#e74c3c;font-weight:700;">⚠ localStorage中没有打分数据（stock_scores_v1 为空）</span><br><span style="color:#666;">可能原因：浏览器清除了数据、使用了不同浏览器/隐私模式、或file://协议的localStorage被禁用</span>';return;}
        try{
            var scores=JSON.parse(s);
            var keys=Object.keys(scores);
            var html='<span style="color:#27ae60;font-weight:700;">✓ 找到打分数据</span><br>';
            html+='localStorage key: <code>stock_scores_v1</code><br>';
            html+='已打分股票数: <strong>'+keys.length+'</strong><br>';
            html+='<details><summary style="cursor:pointer;color:#1a5276;font-size:12px;">查看详细数据</summary><div style="font-size:11px;max-height:200px;overflow:auto;background:#f9f9f9;padding:8px;border-radius:4px;margin-top:5px;">';
            keys.forEach(function(k){var sc=scores[k];html+=k+': 基本面='+(sc.fundamental||0)+' 价格='+(sc.price||0)+(sc.updated?' ('+sc.updated.substring(0,10)+')':'')+'<br>';});
            html+='</div></details>';
            el.innerHTML=html;
        }catch(e){el.innerHTML='<span style="color:#e74c3c;">解析错误: '+e.message+'</span>';}
    }
    function diagExport(){
        var s=localStorage.getItem('stock_scores_v1')||'{}';
        var ta=document.getElementById('diagTextarea');
        ta.style.display='block';ta.value=s;
        ta.select();document.execCommand('copy');
        alert('打分数据已复制到剪贴板！\n请保存到安全的地方。');
    }
    function diagImport(){
        document.getElementById('diagTextarea').style.display='block';
        document.getElementById('diagImportBtn').style.display='inline-block';
    }
    function diagDoImport(){
        var ta=document.getElementById('diagTextarea');
        try{
            JSON.parse(ta.value);
            localStorage.setItem('stock_scores_v1',ta.value);
            alert('导入成功！页面将刷新。');
            location.reload();
        }catch(e){alert('JSON格式错误: '+e.message);}
    }
    </script>

        <table class="score-table">
            <thead>
                <tr>
                    <th data-sort="code" class="sortable">代码</th>
                    <th data-sort="name" class="sortable">名称</th>
                    <th data-sort="fundamental" class="sortable">基本面</th>
                    <th data-sort="price" class="sortable">价格</th>
                    <th data-sort="total" class="sortable">总分</th>
                    <th data-sort="updated" class="sortable">更新时间</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody id="scoreBody"></tbody>
        </table>
    </div>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <h3 id="modalTitle">编辑评分</h3>
            <label>基本面评分 (1-5)</label>
            <select id="modalF"><option value="0">未评分</option><option value="1">1 - 很差</option><option value="2">2 - 较差</option><option value="3">3 - 一般</option><option value="4">4 - 较好</option><option value="5">5 - 优秀</option></select>
            <label>价格评分 (1-5)</label>
            <select id="modalP"><option value="0">未评分</option><option value="1">1 - 极贵</option><option value="2">2 - 偏贵</option><option value="3">3 - 合理</option><option value="4">4 - 偏低</option><option value="5">5 - 极便宜</option></select>
            <div class="modal-btns">
                <button class="btn-delete" id="modalDelete">删除</button>
                <button class="btn-cancel" id="modalCancelBtn">取消</button>
                <button class="btn-save" id="modalSaveBtn">保存</button>
            </div>
        </div>
    </div>

    <script>
    (function(){
        var SCORE_KEY = 'stock_scores_v1';
        var sortState = { field: 'total', dir: 'desc' };
        var editingCode = null;

        // Stock list (synced with index.html)
        var stocks = [
            {code:'AAPL',name:'Apple',href:'aapl.html'},

            {code:'MLI',name:'Mueller',href:'mli.html'},

            {code:'NVO',name:'Novo Nordisk',href:'nvo.html'},
            {code:'PDD',name:'PDD',href:'pdd.html'},
            {code:'PHI',name:'Philippines',href:'phi.html'},
            {code:'PPC',name:'Pilgrim\'s',href:'ppc.html'},
            {code:'RMD',name:'ResMed',href:'rmd.html'},
            {code:'ROL',name:'Rollins',href:'rol.html'},
            {code:'SFM',name:'Sprouts',href:'sfm.html'},
            {code:'SHW',name:'Sherwin-Williams',href:'shw.html'},
            {code:'SPG',name:'Simon Property',href:'spg.html'},

            {code:'UHS',name:'Universal Health',href:'uhs.html'},

            {code:'VIPS',name:'Vipshop',href:'vips.html'},
            {code:'VNT',name:'Vontier',href:'vnt.html'},

            {code:'BAH',name:'Booz Allen',href:'bah.html'},
            {code:'BLBD',name:'Blue Bird',href:'blbd.html'},
            {code:'BR',name:'Broadridge',href:'br.html'},
            {code:'CHH',name:'Choice Hotels',href:'chh.html'},
            {code:'CHKP',name:'Check Point',href:'chkp.html'},
            {code:'CTAS',name:'Cintas',href:'ctas.html'},
            {code:'EXEL',name:'Exelixis',href:'exel.html'},
            {code:'GWW',name:'W.W. Grainger',href:'gww.html'},
            {code:'HESM',name:'Hess Midstream',href:'hems.html'},

            {code:'LII',name:'Lennox Intl',href:'lii.html'},
            {code:'MANH',name:'Manhattan Assoc',href:'manh.html'},
            {code:'MUSA',name:'Sprouts Market',href:'musa.html'},
            {code:'QLYS',name:'Qualys',href:'qlys.html'},
            {code:'RACE',name:'Ferrari',href:'race.html'},
            {code:'RCI',name:'Rogers Comm',href:'rci.html'},
            {code:'ROST',name:'Ross Stores',href:'rost.html'},
            {code:'TJX',name:'TJX Companies',href:'tjx.html'},
            {code:'ULTA',name:'Ulta Beauty',href:'ulta.html'},
            {code:'EME',name:'EMCOR',href:'eme.html'},
            {code:'FIX',name:'Comfort Systems',href:'fix.html'},
            {code:'IESC',name:'IES Holdings',href:'iesc.html'}
        ];

        function getScores(){try{var d=localStorage.getItem(SCORE_KEY);return d?JSON.parse(d):{};}catch(e){return {};}}
        function saveScores(s){localStorage.setItem(SCORE_KEY,JSON.stringify(s));}

        function starsHTML(val){
            var h='';
            for(var i=1;i<=5;i++) h+='<span class="'+(i<=val?'on':'off')+'">&#9733;</span>';
            return h;
        }
        function valClass(v){return v>=5?'s5':v>=4?'s4':v>=3?'s3':v>=2?'s2':'s1';}

        function renderScoreCell(val){
            if(!val||val===0) return '<span class="no-score">-</span>';
            return '<span class="score-val '+valClass(val)+'">'+val+'</span> <span class="stars">'+starsHTML(val)+'</span>';
        }

        function formatTime(isoStr){
            if(!isoStr) return '<span style="color:#ccc;">-</span>';
            try{
                var d=new Date(isoStr);
                if(isNaN(d.getTime())) return '<span style="color:#ccc;">-</span>';
                var mm=String(d.getMonth()+1).padStart(2,'0');
                var dd=String(d.getDate()).padStart(2,'0');
                var hh=String(d.getHours()).padStart(2,'0');
                var mi=String(d.getMinutes()).padStart(2,'0');
                return '<span style="font-size:12px;color:#666;">'+mm+'-'+dd+' '+hh+':'+mi+'</span>';
            }catch(e){return '<span style="color:#ccc;">-</span>';}
        }

        function renderStats(){
            var scores=getScores();
            var total=stocks.length;
            var scored=0,fSum=0,pSum=0,fScored=0,pScored=0;
            stocks.forEach(function(s){
                var sc=scores[s.code]||{};
                if(sc.fundamental>0){fSum+=sc.fundamental;fScored++;}
                if(sc.price>0){pSum+=sc.price;pScored++;}
                if(sc.fundamental>0||sc.price>0) scored++;
            });
            var fAvg=fScored>0?(fSum/fScored).toFixed(1):'-';
            var pAvg=pScored>0?(pSum/pScored).toFixed(1):'-';
            document.getElementById('statsBar').innerHTML=
                '<div class="stat-card"><div class="stat-num">'+total+'</div><div class="stat-label">总股票数</div></div>'+
                '<div class="stat-card"><div class="stat-num">'+scored+'</div><div class="stat-label">已评分</div></div>'+
                '<div class="stat-card"><div class="stat-num">'+fAvg+'</div><div class="stat-label">基本面均分</div></div>'+
                '<div class="stat-card"><div class="stat-num">'+pAvg+'</div><div class="stat-label">价格均分</div></div>';
        }

        function renderTable(){
            var scores=getScores();
            var filterF=document.getElementById('filterF').value;
            var filterP=document.getElementById('filterP').value;

            var data=stocks.map(function(s){
                var sc=scores[s.code]||{};
                return {
                    code:s.code,name:s.name,href:s.href,
                    fundamental:sc.fundamental||0,
                    price:sc.price||0,
                    total:(sc.fundamental||0)+(sc.price||0),
                    updated:sc.updated||''
                };
            });

            // Filter
            data=data.filter(function(s){
                if(filterF!==''){
                    if(filterF==='0'){if(s.fundamental!==0) return false;}
                    else{if(s.fundamental<parseInt(filterF)) return false;}
                }
                if(filterP!==''){
                    if(filterP==='0'){if(s.price!==0) return false;}
                    else{if(s.price<parseInt(filterP)) return false;}
                }
                return true;
            });

            // Sort
            var field=sortState.field,dir=sortState.dir;
            data.sort(function(a,b){
                var va,vb;
                switch(field){
                    case 'code':va=a.code;vb=b.code;break;
                    case 'name':va=a.name;vb=b.name;break;
                    case 'fundamental':va=a.fundamental;vb=b.fundamental;break;
                    case 'price':va=a.price;vb=b.price;break;
                    case 'total':va=a.total;vb=b.total;break;
                    case 'updated':va=a.updated||'';vb=b.updated||'';break;
                    default:va=a.total;vb=b.total;
                }
                var cmp;
                if(typeof va==='number'){cmp=va-vb;}
                else{cmp=va<vb?-1:va>vb?1:0;}
                return dir==='asc'?cmp:-cmp;
            });

            var html='';
            for(var i=0;i<data.length;i++){
                var s=data[i];
                html+='<tr>';
                html+='<td><a href="'+s.href+'">'+s.code+'</a></td>';
                html+='<td>'+s.name+'</td>';
                html+='<td>'+renderScoreCell(s.fundamental)+'</td>';
                html+='<td>'+renderScoreCell(s.price)+'</td>';
                html+='<td style="font-weight:700;">'+(s.total>0?s.total:'<span class="no-score">-</span>')+'</td>';
                html+='<td>'+formatTime(s.updated)+'</td>';
                html+='<td><button class="edit-btn" data-code="'+s.code+'">评分</button></td>';
                html+='</tr>';
            }
            if(data.length===0){
                html='<tr><td colspan="7" class="empty-msg">没有符合条件的股票</td></tr>';
            }
            document.getElementById('scoreBody').innerHTML=html;

            // Sort indicators
            document.querySelectorAll('.sortable').forEach(function(th){
                th.classList.remove('sort-active','desc');
                if(th.getAttribute('data-sort')===field){
                    th.classList.add('sort-active');
                    if(dir==='desc') th.classList.add('desc');
                }
            });

            renderStats();
        }

        // Sort click
        document.addEventListener('click',function(e){
            var th=e.target.closest('.sortable');
            if(th){
                var field=th.getAttribute('data-sort');
                if(sortState.field===field){sortState.dir=sortState.dir==='asc'?'desc':'asc';}
                else{sortState.field=field;sortState.dir='asc';}
                renderTable();
                return;
            }
            var btn=e.target.closest('.edit-btn');
            if(btn){
                var code=btn.getAttribute('data-code');
                openModal(code);
            }
        });

        // Filter
        document.getElementById('filterF').addEventListener('change',renderTable);
        document.getElementById('filterP').addEventListener('change',renderTable);

        // Modal
        function openModal(code){
            editingCode=code;
            var scores=getScores();
            var sc=scores[code]||{};
            document.getElementById('modalTitle').textContent='编辑评分 - '+code;
            document.getElementById('modalF').value=sc.fundamental||0;
            document.getElementById('modalP').value=sc.price||0;
            document.getElementById('modalOverlay').classList.add('active');
        }
        function closeModal(){
            editingCode=null;
            document.getElementById('modalOverlay').classList.remove('active');
        }

        document.getElementById('modalSaveBtn').addEventListener('click',function(){
            if(!editingCode) return;
            var f=parseInt(document.getElementById('modalF').value);
            var p=parseInt(document.getElementById('modalP').value);
            var sc=getScores();
            if(!sc[editingCode]) sc[editingCode]={};
            sc[editingCode].fundamental=f;
            sc[editingCode].price=p;
            sc[editingCode].updated=new Date().toISOString();
            saveScores(sc);
            closeModal();
            renderTable();
        });
        document.getElementById('modalCancelBtn').addEventListener('click',closeModal);
        document.getElementById('modalDelete').addEventListener('click',function(){
            if(!editingCode) return;
            var sc=getScores();
            delete sc[editingCode];
            saveScores(sc);
            closeModal();
            renderTable();
        });
        document.getElementById('modalOverlay').addEventListener('click',function(e){
            if(e.target===this) closeModal();
        });

        // Cross-tab sync
        window.addEventListener('storage',function(e){
            if(e.key===SCORE_KEY) renderTable();
        });
        setInterval(renderTable,3000);

        renderTable();
    })();
    </script>
</body>
</html>
